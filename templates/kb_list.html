<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库列表 - NL2SQL</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #38bdf8; --green: #4ade80; --text: #e2e8f0; --muted: #94a3b8; --purple: #8b5cf6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .top-bar h1 { font-size: 1.4rem; color: var(--accent); }
  .top-bar select { font-family: inherit; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
  .top-bar .nav { font-size: 0.85rem; margin-left: auto; }

  .summary { display: flex; gap: 16px; margin-bottom: 20px; }
  .summary .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; }
  .summary .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .summary .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
  .kb-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; transition: border-color .2s, transform .15s; cursor: pointer; display: flex; flex-direction: column; }
  .kb-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .kb-card h2 { font-size: 1rem; margin-bottom: 6px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .kb-card h2 .kid { font-size: 0.72rem; color: var(--muted); font-weight: 400; }
  .kb-card .desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .meta-row { display: flex; gap: 10px; font-size: 0.75rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
  .badge-blue { background: #1e3a5f; color: var(--accent); }
  .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
  .tables-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .table-tag { background: rgba(139,92,246,0.12); color: var(--purple); padding: 3px 8px; border-radius: 4px; font-size: 0.72rem; font-family: 'SF Mono', monospace; }
  .info-row { display: flex; gap: 16px; font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
  .info-row span { display: flex; align-items: center; gap: 4px; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }
  .error-msg { text-align: center; padding: 40px; color: #f87171; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>📚 知识库列表</h1>
  <div>
    <select id="selTarget" onchange="loadList()">
      <option value="local">Local</option>
      <option value="remote" selected>Remote</option>
    </select>
  </div>
  <div class="nav"><a href="/">← 迁移控制台</a></div>
</div>

<div id="summary" class="summary" style="display:none"></div>
<div id="content"><div class="loading">加载中…</div></div>

<script>
async function loadList() {
  const target = document.getElementById('selTarget').value;
  const wrap = document.getElementById('content');
  const sumWrap = document.getElementById('summary');
  wrap.innerHTML = '<div class="loading">加载中…</div>';
  sumWrap.style.display = 'none';

  try {
    const res = await fetch(`/api/kb?target=${target}`);
    const d = await res.json();
    if (!d.ok) { wrap.innerHTML = `<div class="error-msg">❌ ${d.msg}</div>`; return; }
    if (!d.data.length) { wrap.innerHTML = '<div class="loading">暂无知识库</div>'; return; }

    const totalKb = d.data.length;
    const totalNk = d.data.reduce((s, kb) => s + (kb.knowledge_count || 0), 0);
    const totalTables = new Set();
    d.data.forEach(kb => {
      try { JSON.parse(kb.tables_json || '[]').forEach(t => (t.table_names||[]).forEach(n => totalTables.add(n))); } catch(e){}
    });

    sumWrap.innerHTML = `
      <div class="stat"><div class="stat-num">${totalKb}</div><div class="stat-label">知识库</div></div>
      <div class="stat"><div class="stat-num">${totalNk}</div><div class="stat-label">知识条目</div></div>
      <div class="stat"><div class="stat-num">${totalTables.size}</div><div class="stat-label">关联表</div></div>
    `;
    sumWrap.style.display = 'flex';

    let html = '<div class="grid">';
    d.data.forEach(kb => {
      let tableNames = [];
      try { JSON.parse(kb.tables_json || '[]').forEach(t => tableNames.push(...(t.table_names || []))); } catch(e) {}

      html += `
        <div class="kb-card" onclick="location.href='/kb/${kb.id}?target=${target}'">
          <h2>${esc(kb.name)} <span class="kid">#${kb.id}</span></h2>
          <div class="desc">${esc(kb.usage_notes || '暂无用途说明')}</div>
          <div class="meta-row">
            <span class="badge badge-blue">${kb.knowledge_count} 条知识</span>
            <span class="badge badge-purple">${tableNames.length} 张表</span>
          </div>
          ${tableNames.length ? `<div class="tables-list">${tableNames.map(n => `<span class="table-tag">${esc(n)}</span>`).join('')}</div>` : ''}
          <div class="info-row">
            <span>👤 ${esc(kb.created_by || '-')}</span>
            <span>📅 ${(kb.updated_at || '').replace('T',' ')}</span>
          </div>
        </div>`;
    });
    html += '</div>';
    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadList();
</script>
</body>
</html>
