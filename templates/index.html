let filterRulesLoaded = false;
let frTablesList = [];       // jst_flat_table 的所有表名
let frColumnsCache = {};     // table_name -> [{name, comment}]

const FR_META = {
  data_category:            { icon: '📊', title: '数据口径',           color: 'warm',   desc: '根据管口/法口筛选数据。管口(PC)适合内部管理，法口(LG)适合对外披露。' },
  filter_conditions:        { icon: '🔍', title: '过滤条件',           color: 'accent', desc: '配置数据过滤规则，如排除内部关联交易数据。' },
  data_scope_company:       { icon: '🏢', title: '数据范围 — 按公司',   color: 'green',  desc: '按公司维度限定统计范围，运行时由用户选择具体公司代码。' },
  data_scope_profit_center: { icon: '🏭', title: '数据范围 — 按事业部', color: 'purple', desc: '按事业部/利润中心维度限定统计范围，运行时由用户选择具体事业部。' },
};

function frFmtOp(op) {
  return { eq:'=', ne:'≠', in:'IN', not_in:'NOT IN', gt:'>', gte:'≥', lt:'<', lte:'≤', between:'BETWEEN', like:'LIKE', is_null:'IS NULL', is_not_null:'IS NOT NULL' }[op] || op;
}

function frFmtValue(r) {
  if (r.value_source === 'selected_ids') return '<span style="font-size:0.72rem;padding:2px 8px;border-radius:4px;background:rgba(251,146,60,0.15);color:var(--warm)">用户选择</span>';
  if (r.value_source === 'code_group_code') return '<span style="font-size:0.72rem;padding:2px 8px;border-radius:4px;background:rgba(251,146,60,0.15);color:var(--warm)">编码组映射</span>';
  if (r.literal_value) return `<code style="color:var(--warm)">'${escHtml(r.literal_value)}'</code>`;
  if (r.literal_values) {
    try { const a = JSON.parse(r.literal_values); return `<code style="color:var(--warm)">[${a.map(v=>"'"+escHtml(v)+"'").join(', ')}]</code>`; }
    catch { return `<code style="color:var(--warm)">${escHtml(r.literal_values)}</code>`; }
  }
  return '<span style="color:var(--clay)">—</span>';
}

async function loadFilterRules() {
  const target = document.getElementById('selTarget').value;
  const content = document.getElementById('frContent');
  const summary = document.getElementById('frSummary');
  content.innerHTML = '<div class="empty-msg">加载中…</div>';
  summary.style.display = 'none';

  try {
    const res = await fetch(`/api/filter-rules?target=${target}`);
    const json = await res.json();
    if (!json.ok) { content.innerHTML = `<div class="empty-msg" style="color:var(--red)">❌ ${json.msg}</div>`; return; }

    const data = json.data;
    const keys = Object.keys(data);
    let totalSets = 0, totalRules = 0, tables = new Set();
    for (const k of keys) { totalSets += data[k].length; for (const rs of data[k]) { tables.add(rs.table_name); totalRules += (rs.rules||[]).length; } }

    summary.style.display = 'flex';
    summary.innerHTML = `
      <div class="stat"><div class="stat-val">${keys.length}</div><div class="stat-label">配置类型</div></div>
      <div class="stat"><div class="stat-val">${totalSets}</div><div class="stat-label">规则集</div></div>
      <div class="stat"><div class="stat-val">${totalRules}</div><div class="stat-label">过滤规则</div></div>
      <div class="stat"><div class="stat-val">${tables.size}</div><div class="stat-label">涉及表</div></div>`;

    const order = ['data_category','filter_conditions','data_scope_company','data_scope_profit_center'];
    const sorted = order.filter(k=>data[k]).concat(keys.filter(k=>!order.includes(k)));

    let html = '';
    for (const key of sorted) {
      const m = FR_META[key] || { icon:'⚙️', title:key, color:'accent', desc:'' };
      const items = data[key];
      html += `<div style="margin-bottom:28px">`;
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <span style="font-size:1.2rem">${m.icon}</span>
        <span style="font-size:1.1rem;font-weight:600">${m.title}</span>
        <span class="version-tag" style="background:var(--${m.color});color:#fff;font-size:0.7rem">${items.length} 条</span>
        <button class="btn-primary" style="margin-left:auto;font-size:0.75rem;padding:4px 12px" onclick="openFrModal(null,'${key}')">+ 新增</button>
      </div>`;
      if (m.desc) html += `<div style="font-size:0.82rem;color:var(--clay);margin-bottom:12px;line-height:1.5">${m.desc}</div>`;

      html += `<table class="dtable"><thead><tr><th>表名</th><th>配置值</th><th>字段</th><th>操作符</th><th>过滤值</th><th>说明</th><th style="width:60px"></th></tr></thead><tbody>`;
      for (const rs of items) {
        const rules = rs.rules || [];
        const rsIdx = `_fr_${rs.id}`;
        window[rsIdx] = rs;
        const actionBtns = `<div style="display:flex;gap:4px;justify-content:center">
          <button class="btn-ghost" style="padding:4px 6px;font-size:1rem;line-height:1" onclick="editFrRule(window.${rsIdx})" title="编辑">✏️</button>
          <button class="btn-ghost" style="padding:4px 6px;font-size:1rem;line-height:1" onclick="deleteFrRule(${rs.id})" title="删除">🗑️</button>
        </div>`;
        if (!rules.length) {
          html += `<tr><td><code>${escHtml(rs.table_name)}</code></td><td>${escHtml(rs.config_value)}</td><td colspan="3" style="color:var(--clay)">（无具体规则）</td><td style="font-size:0.78rem;color:var(--clay);max-width:240px">${escHtml(rs.note||'')}</td><td>${actionBtns}</td></tr>`;
        } else {
          for (let i=0;i<rules.length;i++) {
            const r = rules[i];
            html += '<tr>';
            if (i===0) {
              html += `<td rowspan="${rules.length}"><code>${escHtml(rs.table_name)}</code></td>`;
              html += `<td rowspan="${rules.length}">${escHtml(rs.config_value)}</td>`;
            }
            html += `<td><code style="color:var(--green)">${escHtml(r.field)}</code></td>`;
            html += `<td><code style="color:var(--purple)">${frFmtOp(r.op)}</code></td>`;
            html += `<td>${frFmtValue(r)}</td>`;
            if (i===0) {
              html += `<td rowspan="${rules.length}" style="font-size:0.78rem;color:var(--clay);max-width:240px">${escHtml(rs.note||'')}</td>`;
              html += `<td rowspan="${rules.length}">${actionBtns}</td>`;
            }
            html += '</tr>';
          }
        }
      }
      html += '</tbody></table></div>';
    }
    content.innerHTML = html;
    filterRulesLoaded = true;
  } catch(e) { content.innerHTML = `<div class="empty-msg" style="color:var(--red)">❌ ${e.message}</div>`; }
}

// ---- 弹窗逻辑 ----
let frSelectedTable = '';
let frSelectedField = '';
let frCurrentColumns = [];  // [{name, comment}]

async function loadFrTables() {
  if (frTablesList.length) return;
  const target = document.getElementById('selTarget').value;
  const res = await fetch(`/api/filter-rules/tables?target=${target}`);
  const d = await res.json();
  if (d.ok) frTablesList = d.tables;
}

async function loadFrColumns(tableName) {
  if (frColumnsCache[tableName]) return frColumnsCache[tableName];
  const target = document.getElementById('selTarget').value;
  const loading = document.getElementById('frFieldLoading');
  if (loading) loading.style.display = 'block';
  const res = await fetch(`/api/filter-rules/columns?target=${target}&table=${tableName}`);
  const d = await res.json();
  if (loading) loading.style.display = 'none';
  if (d.ok) { frColumnsCache[tableName] = d.columns; return d.columns; }
  return [];
}

// -- custom dropdown toggle --
function toggleFrDropdown(which) {
  const trigger = document.getElementById(which === 'table' ? 'frTableTrigger' : 'frFieldTrigger');
  const dropdown = document.getElementById(which === 'table' ? 'frTableDropdown' : 'frFieldDropdown');
  const isOpen = dropdown.classList.contains('open');
  // close all fr dropdowns first
  ['frTableDropdown','frFieldDropdown'].forEach(id => {
    document.getElementById(id).classList.remove('open');
    document.getElementById(id.replace('Dropdown','Trigger')).classList.remove('open');
  });
  if (!isOpen) {
    trigger.classList.add('open');
    dropdown.classList.add('open');
    const search = dropdown.querySelector('.dbs-search');
    if (search) { search.value = ''; search.focus(); }
    if (which === 'table') filterFrTableOptions();
    else filterFrFieldOptions();
  }
}

// close fr dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#frTableWrap')) {
    document.getElementById('frTableDropdown').classList.remove('open');
    document.getElementById('frTableTrigger').classList.remove('open');
  }
  if (!e.target.closest('#frFieldWrap')) {
    document.getElementById('frFieldDropdown').classList.remove('open');
    document.getElementById('frFieldTrigger').classList.remove('open');
  }
});

function filterFrTableOptions() {
  const q = (document.getElementById('frTableSearch').value || '').toLowerCase();
  const container = document.getElementById('frTableOptions');
  container.innerHTML = frTablesList
    .filter(t => !q || t.toLowerCase().includes(q))
    .map(t => `<div class="dbs-option${t === frSelectedTable ? ' selected' : ''}" onclick="selectFrTable('${escHtml(t)}')">${escHtml(t)}</div>`)
    .join('');
}

function selectFrTable(name) {
  frSelectedTable = name;
  document.getElementById('frTableName').value = name;
  document.getElementById('frTableDisplay').textContent = name;
  document.getElementById('frTableDisplay').className = 'dbs-text';
  document.getElementById('frTableDropdown').classList.remove('open');
  document.getElementById('frTableTrigger').classList.remove('open');
  // reset field
  frSelectedField = '';
  document.getElementById('frField').value = '';
  document.getElementById('frFieldDisplay').textContent = '加载中…';
  document.getElementById('frFieldDisplay').className = 'dbs-text placeholder';
  // load columns
  loadFrColumns(name).then(cols => {
    frCurrentColumns = cols;
    document.getElementById('frFieldDisplay').textContent = '-- 选择字段 --';
    filterFrFieldOptions();
  });
}

function filterFrFieldOptions() {
  const q = (document.getElementById('frFieldSearch').value || '').toLowerCase();
  const container = document.getElementById('frFieldOptions');
  container.innerHTML = frCurrentColumns
    .filter(c => !q || c.name.toLowerCase().includes(q) || (c.comment||'').toLowerCase().includes(q))
    .map(c => {
      const label = c.comment ? `${c.name}  <span style="color:var(--clay);font-family:inherit;font-size:0.78rem">${escHtml(c.comment)}</span>` : escHtml(c.name);
      return `<div class="dbs-option${c.name === frSelectedField ? ' selected' : ''}" onclick="selectFrField('${escHtml(c.name)}')">${label}</div>`;
    }).join('');
  if (!frCurrentColumns.length && !frSelectedTable) {
    container.innerHTML = '<div style="padding:12px 14px;color:var(--clay);font-size:0.82rem">请先选择表名</div>';
  }
}

function selectFrField(name) {
  frSelectedField = name;
  document.getElementById('frField').value = name;
  const col = frCurrentColumns.find(c => c.name === name);
  document.getElementById('frFieldDisplay').textContent = col && col.comment ? `${name} (${col.comment})` : name;
  document.getElementById('frFieldDisplay').className = 'dbs-text';
  document.getElementById('frFieldDropdown').classList.remove('open');
  document.getElementById('frFieldTrigger').classList.remove('open');
}

function onFrOpChange() {
  const op = document.getElementById('frOp').value;
  const isMulti = (op === 'in' || op === 'not_in');
  document.getElementById('frLiteralValue').style.display = isMulti ? 'none' : '';
  document.getElementById('frLiteralValuesWrap').style.display = isMulti ? 'block' : 'none';
}

function _frDefaultValue(configKey) {
  const map = { data_category:'LG', filter_conditions:'non_inter_data', data_scope_company:'_', data_scope_profit_center:'_' };
  return map[configKey] || '_';
}

async function openFrModal(data, presetKey) {
  document.getElementById('frModalTitle').textContent = data ? '编辑过滤规则' : '新增过滤规则';
  document.getElementById('frEditId').value = data ? data.id : '';

  await loadFrTables();

  // table
  frSelectedTable = data ? data.table_name : '';
  document.getElementById('frTableName').value = frSelectedTable;
  if (frSelectedTable) {
    document.getElementById('frTableDisplay').textContent = frSelectedTable;
    document.getElementById('frTableDisplay').className = 'dbs-text';
  } else {
    document.getElementById('frTableDisplay').textContent = '-- 选择表 --';
    document.getElementById('frTableDisplay').className = 'dbs-text placeholder';
  }

  const configKey = data ? data.config_key : (presetKey || 'data_category');
  document.getElementById('frConfigKey').value = configKey;
  document.getElementById('frConfigValue').value = data ? data.config_value : _frDefaultValue(configKey);
  document.getElementById('frNote').value = data ? (data.note || '') : '';

  const rule = data && data.rules && data.rules[0];

  // field
  if (frSelectedTable) {
    const cols = await loadFrColumns(frSelectedTable);
    frCurrentColumns = cols;
    frSelectedField = rule ? rule.field : '';
    document.getElementById('frField').value = frSelectedField;
    if (frSelectedField) {
      const col = cols.find(c => c.name === frSelectedField);
      document.getElementById('frFieldDisplay').textContent = col && col.comment ? `${frSelectedField} (${col.comment})` : frSelectedField;
      document.getElementById('frFieldDisplay').className = 'dbs-text';
    } else {
      document.getElementById('frFieldDisplay').textContent = '-- 选择字段 --';
      document.getElementById('frFieldDisplay').className = 'dbs-text placeholder';
    }
  } else {
    frCurrentColumns = [];
    frSelectedField = '';
    document.getElementById('frField').value = '';
    document.getElementById('frFieldDisplay').textContent = '请先选择表名';
    document.getElementById('frFieldDisplay').className = 'dbs-text placeholder';
  }

  document.getElementById('frOp').value = rule ? rule.op : 'eq';
  document.getElementById('frLiteralValue').value = rule ? (rule.literal_value || '') : '';
  if (rule && rule.literal_values) {
    try { document.getElementById('frLiteralValues').value = JSON.parse(rule.literal_values).join(', '); }
    catch { document.getElementById('frLiteralValues').value = rule.literal_values; }
  } else {
    document.getElementById('frLiteralValues').value = '';
  }
  document.getElementById('frValueSource').value = rule ? (rule.value_source || '') : '';

  onFrOpChange();
  document.getElementById('frModal').classList.add('show');
}

function closeFrModal() { document.getElementById('frModal').classList.remove('show'); }

function editFrRule(rs) { openFrModal(rs); }

async function deleteFrRule(id) {
  const ok = await showDialog('确定删除这条过滤规则？', true);
  if (!ok) return;
  const target = document.getElementById('selTarget').value;
  try {
    const res = await fetch(`/api/filter-rules/${id}?target=${target}`, { method: 'DELETE' });
    const d = await res.json();
    if (!d.ok) { showDialog(d.msg); return; }
    filterRulesLoaded = false;
    loadFilterRules();
  } catch(e) { showDialog(e.message); }
}

async function saveFrRule() {
  const target = document.getElementById('selTarget').value;
  const op = document.getElementById('frOp').value;
  const isMulti = (op === 'in' || op === 'not_in');

  const body = {
    id: document.getElementById('frEditId').value || undefined,
    config_key: document.getElementById('frConfigKey').value,
    config_value: document.getElementById('frConfigValue').value,
    table_name: document.getElementById('frTableName').value,
    note: document.getElementById('frNote').value,
    field: document.getElementById('frField').value,
    op: op,
    value_source: document.getElementById('frValueSource').value || undefined,
  };

  if (!body.table_name) { showDialog('请选择表名'); return; }

  if (isMulti) {
    const raw = document.getElementById('frLiteralValues').value.trim();
    if (raw && !body.value_source) {
      body.literal_values = raw.split(',').map(s => s.trim()).filter(Boolean);
    }
  } else {
    body.literal_value = document.getElementById('frLiteralValue').value.trim() || undefined;
  }

  try {
    const res = await fetch(`/api/filter-rules?target=${target}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const d = await res.json();
    if (!d.ok) { showDialog(d.msg); return; }
    closeFrModal();
    filterRulesLoaded = false;
    loadFilterRules();
  } catch(e) { showDialog(e.message); }
}

// ===== 页面加载自动拉取知识库列表 =====
// 检查是否从 V2 详情页返回
const savedPage = sessionStorage.getItem('activePage');
if (savedPage) {
  sessionStorage.removeItem('activePage');
  const btn = document.querySelector(`.nav-item[onclick*="${savedPage}"]`);
  if (btn) switchPage(savedPage, btn);
  else loadTableComments().then(() => loadKbList());
} else {
  loadTableComments().then(() => loadKbList());
}
</script>
