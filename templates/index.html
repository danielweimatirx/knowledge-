<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL2SQL 迁移控制台</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #38bdf8; --green: #4ade80; --red: #f87171; --text: #e2e8f0; --muted: #94a3b8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 20px; color: var(--accent); }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  label { color: var(--muted); font-size: 0.85rem; }
  select, button { font-family: inherit; font-size: 0.9rem; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
  button { background: var(--accent); color: var(--bg); font-weight: 600; border: none; transition: opacity .15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-data { background: #8b5cf6; }
  .checkbox-wrap { display: flex; align-items: center; gap: 6px; }
  .checkbox-wrap input { width: 16px; height: 16px; }

  /* Status badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
  .badge-idle { background: var(--border); color: var(--muted); }
  .badge-running { background: #1e3a5f; color: var(--accent); animation: pulse 1.2s infinite; }
  .badge-success { background: #14532d; color: var(--green); }
  .badge-error { background: #450a0a; color: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

  /* Log area */
  .log-box { background: #020617; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-top: 12px; max-height: 400px; overflow-y: auto; font-size: 0.82rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .log-box .warn { color: #fbbf24; }
  .log-box .ok { color: var(--green); }
  .log-box .fail { color: var(--red); }
  .log-box .skip { color: var(--muted); }

  /* KB list cards */
  .kb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .kb-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; transition: border-color .2s, transform .15s; cursor: pointer; display: flex; flex-direction: column; }
  .kb-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .kb-card h3 { font-size: 0.95rem; margin-bottom: 6px; color: #fff; }
  .kb-card h3 .kid { font-size: 0.72rem; color: var(--muted); font-weight: 400; }
  .kb-card .desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .kb-card .card-meta { display: flex; gap: 8px; font-size: 0.72rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .badge-sm { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
  .badge-blue { background: #1e3a5f; color: var(--accent); }
  .badge-purple { background: rgba(139,92,246,0.15); color: #8b5cf6; }
  .table-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .table-tag { background: rgba(139,92,246,0.1); color: #8b5cf6; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
  .kb-summary { display: flex; gap: 14px; margin-bottom: 14px; }
  .kb-summary .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; }
  .kb-summary .stat-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .kb-summary .stat-label { font-size: 0.72rem; color: var(--muted); }
  .tab-bar { display: flex; gap: 0; margin-bottom: 0; }
  .tab-bar button { border-radius: 6px 6px 0 0; background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-bottom: none; font-size: 0.82rem; padding: 6px 18px; }
  .tab-bar button.active { background: var(--card); color: var(--text); }
  .data-table-wrap { max-height: 500px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { position: sticky; top: 0; background: var(--card); color: var(--accent); font-weight: 600; }
  tr:hover td { background: rgba(56,189,248,0.05); }
  .empty-msg { color: var(--muted); padding: 40px; text-align: center; }

  .meta { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<h1>⚡ NL2SQL 知识库迁移控制台</h1>

<!-- 控制面板 -->
<div class="panel">
  <div class="controls">
    <div>
      <label>目标库</label><br>
      <select id="selTarget">
        <option value="local">Local (Docker)</option>
        <option value="remote">Remote (新工作区)</option>
      </select>
    </div>
    <div class="checkbox-wrap" style="margin-top:18px">
      <input type="checkbox" id="chkDry">
      <label for="chkDry">Dry Run（空跑）</label>
    </div>
    <button id="btnRun" style="margin-top:18px" onclick="runMigration()">▶ 执行迁移</button>
    <span id="statusBadge" class="badge badge-idle" style="margin-top:18px">IDLE</span>
    <span id="timeMeta" class="meta" style="margin-top:18px"></span>
  </div>

  <div id="logBox" class="log-box" style="display:none"></div>
</div>

<!-- 数据面板 -->
<div class="panel">
  <div class="controls" style="margin-bottom: 12px;">
    <button class="btn-data" onclick="loadData()">📊 查看最新数据</button>
    <span id="dataMsg" class="meta"></span>
  </div>

  <div class="tab-bar">
    <button class="active" onclick="switchTab('kb', this)">knowledge_base</button>
    <button onclick="switchTab('nk', this)">nl2sql_knowledge</button>
  </div>

  <div id="tab-kb" class="data-table-wrap" style="border:1px solid var(--border); border-radius: 0 6px 6px 6px;">
    <div class="empty-msg">点击「查看最新数据」加载</div>
  </div>
  <div id="tab-nk" class="data-table-wrap" style="border:1px solid var(--border); border-radius: 0 6px 6px 6px; display:none;">
    <div class="empty-msg">点击「查看最新数据」加载</div>
  </div>
</div>

<!-- 知识库列表 -->
<div class="panel">
  <div class="controls" style="margin-bottom: 12px;">
    <button style="background:#10b981" onclick="loadKbList()">📚 加载知识库列表</button>
    <span id="kbMsg" class="meta"></span>
  </div>
  <div id="kbSummary" class="kb-summary" style="display:none"></div>
  <div id="kbGrid"></div>
</div>

<script>
let pollTimer = null;
let logOffset = 0;

async function runMigration() {
  const target = document.getElementById('selTarget').value;
  const dryRun = document.getElementById('chkDry').checked;
  const btn = document.getElementById('btnRun');
  btn.disabled = true;

  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ target, dry_run: dryRun }),
  });
  const data = await res.json();
  if (!data.ok) { alert(data.msg); btn.disabled = false; return; }

  logOffset = 0;
  document.getElementById('logBox').style.display = 'block';
  document.getElementById('logBox').innerHTML = '';
  updateBadge('running');
  pollTimer = setInterval(pollStatus, 800);
}

async function pollStatus() {
  const res = await fetch(`/api/status?since=${logOffset}`);
  const d = await res.json();

  // Append new log lines
  const box = document.getElementById('logBox');
  d.logs.forEach(line => {
    const span = document.createElement('span');
    span.textContent = line + '\n';
    if (line.includes('[WARN]')) span.className = 'warn';
    else if (line.includes('[OK]')) span.className = 'ok';
    else if (line.includes('[FAIL]') || line.includes('Error')) span.className = 'fail';
    else if (line.includes('[SKIP]') || line.includes('[DRY]')) span.className = 'skip';
    box.appendChild(span);
  });
  logOffset = d.total_lines;
  box.scrollTop = box.scrollHeight;

  // Time info
  let meta = '';
  if (d.started_at) meta += '开始: ' + d.started_at;
  if (d.finished_at) meta += '  完成: ' + d.finished_at;
  document.getElementById('timeMeta').textContent = meta;

  updateBadge(d.status);

  if (d.status !== 'running') {
    clearInterval(pollTimer);
    document.getElementById('btnRun').disabled = false;
  }
}

function updateBadge(status) {
  const el = document.getElementById('statusBadge');
  el.className = 'badge badge-' + status;
  const labels = { idle: 'IDLE', running: 'RUNNING…', success: 'SUCCESS', error: 'ERROR' };
  el.textContent = labels[status] || status;
}

async function loadData() {
  const target = document.getElementById('selTarget').value;
  document.getElementById('dataMsg').textContent = '加载中…';
  try {
    const res = await fetch(`/api/data?target=${target}`);
    const d = await res.json();
    if (!d.ok) { document.getElementById('dataMsg').textContent = '❌ ' + d.msg; return; }

    renderTable('tab-kb', d.knowledge_base, ['id','name','usage_notes','tables_json','created_by','updated_by','created_at','updated_at']);
    renderTable('tab-nk', d.nl2sql_knowledge, ['id','knowledge_base_id','knowledge_type','knowledge_key_preview','name','explanation_type','created_at','updated_at']);
    document.getElementById('dataMsg').textContent =
      `knowledge_base: ${d.knowledge_base.length} 条 | nl2sql_knowledge: ${d.nl2sql_knowledge.length} 条`;
  } catch (e) {
    document.getElementById('dataMsg').textContent = '❌ ' + e.message;
  }
}

function renderTable(containerId, rows, cols) {
  const wrap = document.getElementById(containerId);
  if (!rows.length) { wrap.innerHTML = '<div class="empty-msg">暂无数据</div>'; return; }
  let html = '<table><thead><tr>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>';
    cols.forEach(c => {
      let v = r[c] ?? '';
      if (typeof v === 'string' && v.length > 120) v = v.substring(0, 120) + '…';
      html += `<td>${escHtml(String(v))}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-kb').style.display = tab === 'kb' ? '' : 'none';
  document.getElementById('tab-nk').style.display = tab === 'nk' ? '' : 'none';
}

async function loadKbList() {
  const target = document.getElementById('selTarget').value;
  const grid = document.getElementById('kbGrid');
  const sumWrap = document.getElementById('kbSummary');
  const msg = document.getElementById('kbMsg');
  grid.innerHTML = '<div class="empty-msg">加载中…</div>';
  sumWrap.style.display = 'none';
  msg.textContent = '';

  try {
    const res = await fetch(`/api/kb?target=${target}`);
    const d = await res.json();
    if (!d.ok) { grid.innerHTML = ''; msg.textContent = '❌ ' + d.msg; return; }
    if (!d.data.length) { grid.innerHTML = '<div class="empty-msg">暂无知识库</div>'; return; }

    const totalKb = d.data.length;
    const totalNk = d.data.reduce((s, kb) => s + (kb.knowledge_count || 0), 0);
    const allTables = new Set();
    d.data.forEach(kb => {
      try { JSON.parse(kb.tables_json || '[]').forEach(t => (t.table_names||[]).forEach(n => allTables.add(n))); } catch(e){}
    });

    sumWrap.innerHTML = `
      <div class="stat"><div class="stat-num">${totalKb}</div><div class="stat-label">知识库</div></div>
      <div class="stat"><div class="stat-num">${totalNk}</div><div class="stat-label">知识条目</div></div>
      <div class="stat"><div class="stat-num">${allTables.size}</div><div class="stat-label">关联表</div></div>`;
    sumWrap.style.display = 'flex';

    let html = '<div class="kb-grid">';
    d.data.forEach(kb => {
      let tableNames = [];
      try { JSON.parse(kb.tables_json || '[]').forEach(t => tableNames.push(...(t.table_names || []))); } catch(e) {}

      html += `
        <div class="kb-card" onclick="location.href='/kb/${kb.id}?target=${target}'">
          <h3>${escHtml(kb.name)} <span class="kid">#${kb.id}</span></h3>
          <div class="desc">${escHtml(kb.usage_notes || '暂无用途说明')}</div>
          <div class="card-meta">
            <span class="badge-sm badge-blue">${kb.knowledge_count} 条知识</span>
            <span class="badge-sm badge-purple">${tableNames.length} 张表</span>
            <span>👤 ${escHtml(kb.created_by || '-')}</span>
            <span>📅 ${(kb.updated_at || '').replace('T',' ')}</span>
          </div>
          ${tableNames.length ? `<div class="table-tags">${tableNames.map(n => `<span class="table-tag">${escHtml(n)}</span>`).join('')}</div>` : ''}
        </div>`;
    });
    html += '</div>';
    grid.innerHTML = html;
    msg.textContent = `共 ${totalKb} 个知识库`;
  } catch(e) {
    grid.innerHTML = '';
    msg.textContent = '❌ ' + e.message;
  }
}
</script>
</body>
</html>
