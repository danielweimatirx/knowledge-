<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 语义模型 - NL2SQL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --bg-deep: #ebe4d6; --card: #fffcf5;
    --border: #d4c9b4; --border-light: #e8dfd0;
    --accent: #5a7a5a; --accent-light: #7a9e7a; --accent-glow: rgba(90,122,90,0.12);
    --warm: #c17f4e; --warm-light: rgba(193,127,78,0.1);
    --clay: #b85c3a; --clay-light: rgba(184,92,58,0.08);
    --purple: #7c5cbf; --purple-light: rgba(124,92,191,0.1);
    --blue: #4a7a9a; --blue-light: rgba(74,122,154,0.1);
    --green: #4a7a4a; --green-light: rgba(74,122,74,0.1);
    --text: #3d3428; --text-secondary: #6b5e4f; --muted: #9a8b78;
    --shadow: 0 2px 20px rgba(61,52,40,0.06);
    --radius: 16px; --radius-sm: 10px;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border-light); padding: 20px 28px; position: sticky; top: 0; z-index: 50; }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .header h1 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; }
  .header h1 span { color: var(--purple); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .header-right label { font-size: 0.75rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  select { font-family: var(--font-body); font-size: 0.85rem; padding: 7px 30px 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
  .nav-link { font-size: 0.85rem; color: var(--accent); text-decoration: none; }
  .nav-link:hover { text-decoration: underline; }

  .container { max-width: 1400px; margin: 0 auto; padding: 28px; }

  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input { font-family: var(--font-body); font-size: 0.88rem; padding: 8px 16px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg); color: var(--text); width: 240px; }
  .search-input:focus { outline: none; border-color: var(--accent); }

  button { font-family: var(--font-body); font-size: 0.85rem; padding: 9px 20px; border-radius: 24px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: var(--purple); color: #fff; }
  .btn-primary:hover { background: #6a4aaf; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-deep); color: var(--text); }
  .btn-danger { background: var(--clay-light); color: var(--clay); }
  .btn-danger:hover { background: var(--clay); color: #fff; }

  .summary { display: flex; gap: 14px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 14px 24px; text-align: center; box-shadow: var(--shadow); }
  .stat-num { font-family: var(--font-display); font-size: 1.5rem; color: var(--purple); }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 20px; transition: all 0.3s; cursor: pointer; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--purple), var(--blue)); opacity: 0; transition: opacity 0.3s; }
  .card:hover { box-shadow: 0 8px 32px rgba(61,52,40,0.1); transform: translateY(-3px); }
  .card:hover::before { opacity: 1; }
  .card h3 { font-family: var(--font-display); font-size: 1rem; font-weight: 400; margin-bottom: 6px; }
  .card h3 .mid { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-left: 6px; }
  .card .desc { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .card-meta { display: flex; gap: 8px; font-size: 0.7rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.68rem; font-weight: 600; }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .table-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
  .table-tag { background: var(--accent-glow); color: var(--accent); padding: 3px 10px; border-radius: 12px; font-size: 0.68rem; font-family: var(--font-mono); }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .card-actions button { font-size: 0.72rem; padding: 5px 14px; }

  .empty-msg { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }
  .meta { font-size: 0.78rem; color: var(--muted); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(61,52,40,0.4); backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 28px; width: 520px; max-width: 92vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(61,52,40,0.2); }
  .modal h2 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 20px; font-weight: 400; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field textarea { width: 100%; font-family: var(--font-body); font-size: 0.88rem; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); resize: vertical; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--purple); }
  .field textarea { min-height: 80px; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>V2 <span>语义模型</span></h1>
    <div class="header-right">
      <a href="/" class="nav-link">← V1 知识库</a>
      <label>工作区</label>
      <select id="selTarget" onchange="loadList()">
        <option value="remote" selected>问数Dev</option>
        <option value="portal">AI Portal</option>
        <option value="local">Local (Docker)</option>
      </select>
    </div>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索模型名称…" oninput="applyFilter()">
    <div style="margin-left:auto;display:flex;gap:10px">
      <button class="btn-primary" onclick="openModal()">+ 新增模型</button>
      <button class="btn-ghost" onclick="loadList()">刷新</button>
    </div>
  </div>
  <div id="summary" class="summary" style="display:none"></div>
  <div id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">新增语义模型</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>模型名称 *</label>
      <input type="text" id="modelName" placeholder="例如：收入成本分析">
    </div>
    <div class="field">
      <label>描述</label>
      <textarea id="modelDesc" placeholder="描述这个语义模型的用途…"></textarea>
    </div>
    <div class="field">
      <label>关联表 (JSON 数组)</label>
      <textarea id="modelTables" placeholder='["table1", "table2"]'></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveModel()">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="modal-overlay" id="dialogOverlay">
  <div class="modal" style="width:400px;text-align:center;padding:32px 28px 24px">
    <div id="dialogMsg" style="font-size:0.92rem;line-height:1.7;margin-bottom:24px;white-space:pre-wrap"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn-ghost" id="dialogCancel">取消</button>
      <button class="btn-primary" id="dialogConfirm">好的</button>
    </div>
  </div>
</div>

<script>
let listData = [];

async function loadList() {
  const target = document.getElementById('selTarget').value;
  const grid = document.getElementById('grid');
  const summary = document.getElementById('summary');
  grid.innerHTML = '<div class="empty-msg">加载中…</div>';
  summary.style.display = 'none';

  try {
    const res = await fetch(`/api/v2/models?target=${target}`);
    const d = await res.json();
    if (!d.ok) { grid.innerHTML = `<div class="empty-msg">❌ ${d.msg}</div>`; return; }
    listData = d.data;
    if (!listData.length) { grid.innerHTML = '<div class="empty-msg">暂无语义模型</div>'; return; }

    const totalModels = listData.length;
    const totalEntries = listData.reduce((s, m) => s + (m.entry_count || 0), 0);
    const allTables = new Set();
    listData.forEach(m => { try { JSON.parse(m.tables_json || '[]').forEach(t => allTables.add(t)); } catch(e){} });

    summary.innerHTML = `
      <div class="stat"><div class="stat-num">${totalModels}</div><div class="stat-label">语义模型</div></div>
      <div class="stat"><div class="stat-num">${totalEntries}</div><div class="stat-label">语义条目</div></div>
      <div class="stat"><div class="stat-num">${allTables.size}</div><div class="stat-label">关联表</div></div>`;
    summary.style.display = 'flex';
    renderGrid(listData);
  } catch(e) { grid.innerHTML = `<div class="empty-msg">❌ ${e.message}</div>`; }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = listData.filter(m => !q || m.name.toLowerCase().includes(q));
  renderGrid(filtered);
}

function renderGrid(data) {
  const grid = document.getElementById('grid');
  const target = document.getElementById('selTarget').value;
  if (!data.length) { grid.innerHTML = '<div class="empty-msg">无匹配结果</div>'; return; }

  let html = '<div class="grid">';
  data.forEach(m => {
    let tables = [];
    try { tables = JSON.parse(m.tables_json || '[]'); } catch(e) {}

    html += `
      <div class="card">
        <div onclick="location.href='/v2/model/${m.id}?target=${target}'" style="flex:1">
          <h3>${esc(m.name)}<span class="mid">#${m.id}</span></h3>
          <div class="desc">${esc(m.description || '暂无描述')}</div>
          <div class="card-meta">
            <span class="badge badge-purple">${m.entry_count} 条目</span>
            <span class="badge badge-blue">${tables.length} 张表</span>
            ${m.knowledge_base_id ? `<span class="meta">关联V1 #${m.knowledge_base_id}</span>` : ''}
          </div>
          ${tables.length ? `<div class="table-tags">${tables.slice(0,5).map(t => `<span class="table-tag">${esc(t)}</span>`).join('')}${tables.length > 5 ? `<span class="meta">+${tables.length-5}</span>` : ''}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-ghost" onclick="event.stopPropagation();editModel(${m.id})">编辑</button>
          <button class="btn-danger" onclick="event.stopPropagation();deleteModel(${m.id},'${esc(m.name).replace(/'/g,"\\'")}')">删除</button>
        </div>
      </div>`;
  });
  html += '</div>';
  grid.innerHTML = html;
}

function openModal(model) {
  document.getElementById('modalTitle').textContent = model ? '编辑语义模型' : '新增语义模型';
  document.getElementById('editId').value = model ? model.id : '';
  document.getElementById('modelName').value = model ? model.name : '';
  document.getElementById('modelDesc').value = model ? (model.description || '') : '';
  document.getElementById('modelTables').value = model ? (model.tables_json || '[]') : '[]';
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

async function editModel(id) {
  const target = document.getElementById('selTarget').value;
  try {
    const res = await fetch(`/api/v2/models/${id}?target=${target}`);
    const d = await res.json();
    if (!d.ok) { showDialog(d.msg); return; }
    openModal(d.model);
  } catch(e) { showDialog(e.message); }
}

async function saveModel() {
  const target = document.getElementById('selTarget').value;
  const editId = document.getElementById('editId').value;
  const name = document.getElementById('modelName').value.trim();
  if (!name) { showDialog('模型名称必填'); return; }

  const body = {
    name,
    description: document.getElementById('modelDesc').value.trim() || null,
    tables_json: document.getElementById('modelTables').value.trim() || '[]',
  };

  const url = editId ? `/api/v2/models/${editId}?target=${target}` : `/api/v2/models?target=${target}`;
  try {
    const res = await fetch(url, { method: editId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await res.json();
    if (!d.ok) { showDialog(d.msg); return; }
    closeModal();
    loadList();
  } catch(e) { showDialog(e.message); }
}

async function deleteModel(id, name) {
  if (!await showDialog(`确定删除语义模型「${name}」及其所有条目？\n此操作不可恢复。`, {type:'confirm'})) return;
  const target = document.getElementById('selTarget').value;
  try {
    const res = await fetch(`/api/v2/models/${id}?target=${target}`, { method: 'DELETE' });
    const d = await res.json();
    if (!d.ok) { showDialog(d.msg); return; }
    loadList();
  } catch(e) { showDialog(e.message); }
}

function showDialog(msg, {type = 'alert'} = {}) {
  return new Promise(resolve => {
    const overlay = document.getElementById('dialogOverlay');
    document.getElementById('dialogMsg').textContent = msg;
    const confirmBtn = document.getElementById('dialogConfirm');
    const cancelBtn = document.getElementById('dialogCancel');
    if (type === 'confirm') { confirmBtn.textContent = '确定'; cancelBtn.style.display = ''; }
    else { confirmBtn.textContent = '好的'; cancelBtn.style.display = 'none'; }
    overlay.classList.add('show');
    const cleanup = (val) => { overlay.classList.remove('show'); resolve(val); };
    confirmBtn.onclick = () => cleanup(true);
    cancelBtn.onclick = () => cleanup(false);
    overlay.onclick = (e) => { if (e.target === overlay) cleanup(false); };
  });
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadList();
</script>
</body>
</html>
